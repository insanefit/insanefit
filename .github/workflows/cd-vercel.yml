# .github/workflows/cd-vercel.yml
name: CD Vercel

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: cd-vercel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-preview:
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - run: npx vercel build --token="$VERCEL_TOKEN"
      - run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
