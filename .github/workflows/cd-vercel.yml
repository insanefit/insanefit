name: CD Vercel

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: cd-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: isamarjunior-1867s-projects
      VERCEL_PROJECT_NAME: insanefit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug Vercel Secrets Presence
        run: |
          test -n "$VERCEL_TOKEN" || (echo "VERCEL_TOKEN ausente" && exit 1)
          test -n "$VERCEL_SCOPE" || (echo "VERCEL_SCOPE ausente" && exit 1)
          test -n "$VERCEL_PROJECT_NAME" || (echo "VERCEL_PROJECT_NAME ausente" && exit 1)
          echo "Secrets carregados com sucesso."
          echo "SCOPE: $VERCEL_SCOPE"
          echo "PROJECT_NAME: $VERCEL_PROJECT_NAME"

      - name: Debug Vercel Auth
        run: npx vercel whoami --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" --debug

      - name: Link Project Explicitly
        run: npx vercel link --yes --project="$VERCEL_PROJECT_NAME" --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" --debug

      - name: Pull Vercel Environment (Preview)
        run: npx vercel pull --yes --environment=preview --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" --debug

      - name: Build Project Artifacts
        run: npx vercel build --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" --debug

      - name: Deploy Preview
        run: npx vercel deploy --prebuilt --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN" --debug

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: isamarjunior-1867s-projects
      VERCEL_PROJECT_NAME: insanefit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel Environment (Production)
        run: npx vercel pull --yes --environment=production --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        run: npx vercel build --prod --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN"

      - name: Deploy Production
        run: npx vercel deploy --prebuilt --prod --scope="$VERCEL_SCOPE" --token="$VERCEL_TOKEN"
